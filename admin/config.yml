# Decap CMS 后台配置
backend:
  name: github
  repo: baerdk123/nav-site
  branch: main
  auth_type: github-pat
  token: GITHUB_TOKEN_PLACEHOLDER

local_backend: false
publish_mode: editorial_workflow
media_folder: "assets/uploads"
public_folder: "/assets/uploads"
site_url: "https://nav-site-akx.pages.dev"
display_url: "https://nav-site-akx.pages.dev"
logo_url: ""

collections:
  - name: "navigation"
    label: "书签管理"
    label_singular: "书签"
    description: "管理导航站所有分类和链接"
    extension: json
    format: json
    editor:
      preview: false
    files:
      - name: "links"
        label: "书签数据库"
        file: "links.json"
        fields:
          - name: "title"
            label: "页面标题"
            widget: "string"
          - name: "subtitle"
            label: "副标题"
            widget: "string"
          - name: "sections"
            label: "分类列表"
            label_singular: "分类"
            widget: "list"
            collapsed: false
            fields:
              - name: "id"
                label: "分类ID（英文唯一标识）"
                widget: "string"
              - name: "name"
                label: "分类名称（可加 Emoji）"
                widget: "string"
              - name: "cssClass"
                label: "CSS样式类（可选）"
                widget: "string"
                required: false
              - name: "links"
                label: "链接列表"
                label_singular: "链接"
                widget: "list"
                collapsed: false
                fields:
                  - { name: "emoji", label: "图标(Emoji)", widget: "string" }
                  - { name: "name", label: "名称", widget: "string" }
                  - { name: "url", label: "网址", widget: "string" }
          - name: "quickLinks"
            label: "快速链接（顶部导航栏）"
            label_singular: "链接"
            widget: "list"
            collapsed: false
            fields:
              - { name: "icon", label: "图标类型", widget: "string", default: "svg" }
              - { name: "name", label: "名称", widget: "string" }
              - { name: "url", label: "网址", widget: "string" }
