<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>导航后台管理</title>
  <link rel="stylesheet" href="https://unpkg.com/decap-cms@^3/dist/cms.css" />
  <style>
    body { background: #f5f5f7; margin: 0; }
    .cms-loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; color: #86868b; font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="cms-loading">🔐 后台加载中，请稍候...</div>

  <!-- Decap CMS 入口 -->
  <script src="https://unpkg.com/decap-cms@^3/dist/cms.js"></script>

  <!-- 
    ★ 关键：GitHub Token 注入方式 ★
    
    方式A（推荐 — 纯免费，无 Worker）：
    1. 在 GitHub 创建 Personal Access Token（repo 权限）
    2. 在 Cloudflare Pages 后台 → 项目 → Settings → Environment variables
       添加 GITHUB_TOKEN = 你的 token
    3. 在 Cloudflare Pages 后台 → Build settings
       设置 Build command = "echo 'static build'"
      设置 Build output directory = "/"
    4. 部署后，Cloudflare 会为你的站点自动注入环境变量，
       不需要额外配置（是的，Cloudflare Pages 普通变量会自动注入到构建环境）
    
    方式B（如果有自己的域名/服务器）：
    直接将 token 写死在 config.yml 的 backend.token 字段（不推荐，token 会进 git 历史）
  -->
</body>
</html>
