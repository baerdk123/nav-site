<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的导航</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    min-height: 100vh;
    padding: 0 20px 60px;
  }
  .container { max-width: 960px; margin: 0 auto; }
  header {
    padding: 40px 0 24px;
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 24px; font-weight: 600; }
  header .badge {
    font-size: 11px; background: #e8e8ed; color: #6e6e73;
    padding: 2px 10px; border-radius: 20px;
  }
  .section {
    margin-bottom: 32px;
  }
  .section-header {
    font-size: 15px; font-weight: 600; color: #86868b;
    margin-bottom: 12px; letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }
  .card {
    background: #fff;
    border-radius: 14px;
    padding: 16px;
    text-decoration: none;
    color: inherit;
    transition: box-shadow .15s, transform .15s;
    border: 1px solid rgba(0,0,0,.06);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,.08);
    transform: translateY(-2px);
  }
  .card-icon { font-size: 22px; line-height: 1; }
  .card-title { font-size: 14px; font-weight: 500; }
  .card-desc { font-size: 12px; color: #86868b; line-height: 1.4; }
  .empty-state {
    grid-column: 1 / -1;
    text-align: center; color: #86868b;
    padding: 40px 0; font-size: 14px;
  }
  .loading { text-align: center; padding: 60px 0; color: #86868b; font-size: 14px; }
  .footer {
    text-align: center; font-size: 12px; color: #86868b;
    padding-top: 40px; border-top: 1px solid #e8e8ed; margin-top: 40px;
  }
  .footer a { color: #86868b; text-decoration: underline; }
  @media (max-width: 480px) {
    .card-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .card { padding: 12px; border-radius: 12px; }
    header { padding: 24px 0 16px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📎 导航站</h1>
    <span class="badge">书签直达</span>
  </header>
  <div id="app"><div class="loading">加载中...</div></div>
  <div class="footer">
    自助编辑 → <a href="/admin">后台管理</a>
  </div>
</div>
<script>
(async function() {
  const app = document.getElementById('app');
  try {
    const res = await fetch('/links.json?' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data.categories || data.categories.length === 0) {
      app.innerHTML = '<div class="empty-state">暂无书签，去<a href="/admin">后台</a>添加</div>';
      return;
    }
    let html = '';
    for (const cat of data.categories) {
      if (!cat.links || cat.links.length === 0) continue;
      html += '<div class="section">';
      html += '<div class="section-header">' + (cat.icon || '📌') + ' ' + (cat.name || '未分类') + '</div>';
      html += '<div class="card-grid">';
      for (const link of cat.links) {
        html += '<a class="card" href="' + link.url + '" target="_blank" rel="noopener">';
        if (link.icon) html += '<div class="card-icon">' + link.icon + '</div>';
        html += '<div class="card-title">' + (link.title || link.url) + '</div>';
        if (link.desc) html += '<div class="card-desc">' + link.desc + '</div>';
        html += '</a>';
      }
      html += '</div></div>';
    }
    app.innerHTML = html;
  } catch(e) {
    app.innerHTML = '<div class="empty-state">加载失败（' + e.message + '），请检查 links.json 是否存在</div>';
  }
})();
</script>
</body>
</html>
